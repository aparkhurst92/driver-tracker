<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aussie Water Sports — Driver Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
            overflow: hidden;
        }
        .container { display: flex; height: 100vh; }

        /* ── Sidebar ── */
        .sidebar {
            width: 420px;
            background: #fff;
            border-right: 3px solid #e0e0e0;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .header {
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 3px solid #4CAF50;
        }
        .header h1 { font-size: 28px; color: #2c3e50; font-weight: 700; margin-bottom: 4px; }
        .last-update { font-size: 13px; color: #888; }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        .tab {
            flex: 1;
            padding: 9px 6px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: #f8f9fa;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .tab.active {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }

        /* ── Section panels ── */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── Booking cards ── */
        .booking-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-left: 5px solid #4CAF50;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .booking-card:hover { transform: translateX(5px); box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
        .booking-card.selected { background: #e8f5e9; border-left-width: 7px; }
        .booking-card.assigned { border-color: #2196F3; }
        .booking-card.unassigned { border-color: #FF9800; }

        .booking-title {
            font-size: 15px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .booking-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .booking-badge.assigned   { background: #2196F3; }
        .booking-badge.unassigned { background: #FF9800; }

        .booking-detail {
            font-size: 13px;
            color: #555;
            line-height: 1.9;
        }
        .booking-detail .lbl { color: #999; font-weight: 600; display: inline-block; width: 80px; }

        .assign-select {
            width: 100%;
            margin-top: 10px;
            padding: 8px 10px;
            border: 2px solid #ddd;
            border-radius: 7px;
            font-size: 13px;
            background: #fff;
            cursor: pointer;
        }
        .assign-select:focus { outline: none; border-color: #4CAF50; }

        .eta-chip {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 12px;
            background: #e8f5e9;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #2e7d32;
        }

        /* ── Driver cards ── */
        .driver-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-left: 5px solid;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .driver-card:hover { transform: translateX(5px); box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
        .driver-card.selected { background: #e8f5e9; border-left-width: 7px; }
        .driver-card.active      { border-color: #4CAF50; }
        .driver-card.returning   { border-color: #2196F3; }
        .driver-card.at-location { border-color: #FF9800; }
        .driver-card.offline     { border-color: #f44336; opacity: 0.75; }

        .driver-name {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
        }
        .status-badge.active      { background: #4CAF50; }
        .status-badge.returning   { background: #2196F3; }
        .status-badge.at-location { background: #FF9800; }
        .status-badge.offline     { background: #f44336; }

        .driver-detail { font-size: 13px; color: #555; line-height: 1.9; }
        .driver-detail .lbl { color: #999; font-weight: 600; display: inline-block; width: 100px; }

        .eta-row {
            background: #fff;
            padding: 8px 12px;
            border-radius: 7px;
            margin-top: 8px;
            border: 1.5px solid #e0e0e0;
            font-size: 13px;
        }
        .location-time { font-size: 12px; color: #aaa; margin-top: 8px; font-style: italic; }

        /* ── Check-in form ── */
        .form-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #e6e6e6;
        }
        .form-card h3 { font-size: 16px; color: #2c3e50; margin-bottom: 12px; font-weight: 700; }
        .input-group { margin-bottom: 11px; }
        .input-group label { display: block; font-weight: 600; color: #555; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
        }
        .input-group input:focus,
        .input-group select:focus { outline: none; border-color: #4CAF50; }
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-start { background: #4CAF50; color: white; }
        .btn-stop  { background: #f44336; color: white; }
        .tracking-badge {
            display: none; align-items: center; gap: 8px;
            padding: 10px 14px; background: #e8f5e9; border-radius: 8px;
            font-size: 13px; font-weight: 600; color: #2e7d32; margin-bottom: 10px;
        }
        .tracking-badge.on { display: flex; }
        .dot {
            width: 10px; height: 10px; background: #4CAF50;
            border-radius: 50%; flex-shrink: 0; animation: blink 1.3s infinite;
        }
        @keyframes blink {
            0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,0.5); }
            50%      { box-shadow: 0 0 0 7px rgba(76,175,80,0); }
        }
        .status-box { padding: 11px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; margin-top: 4px; }
        .status-box.ok      { display:block; background:#d4edda; color:#155724; border:1px solid #b8dfc4; }
        .status-box.err     { display:block; background:#f8d7da; color:#721c24; border:1px solid #f1b0b7; }
        .status-box.waiting { display:block; background:#fff3cd; color:#856404; border:1px solid #ffe08a; }

        /* ── Map ── */
        #map { flex: 1; position: relative; }
        .refresh-indicator {
            position: absolute; top: 16px; right: 16px;
            background: rgba(255,255,255,0.95); padding: 10px 20px;
            border-radius: 8px; font-size: 13px; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); border: 2px solid #e0e0e0;
            color: #333; font-weight: 600;
        }
        .refresh-indicator.active { background: rgba(76,175,80,0.95); color: white; border-color: #4CAF50; }

        .empty-state { text-align: center; padding: 30px 16px; color: #999; }
        .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: #555; }

        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-track { background: #f1f1f1; }
        .sidebar::-webkit-scrollbar-thumb { background: #4CAF50; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="header">
            <h1>🚤 Aussie Tracker</h1>
            <div class="last-update">Updated: <span id="lastUpdate">--</span></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('bookings')">📋 Bookings</div>
            <div class="tab" onclick="switchTab('drivers')">🚗 Drivers</div>
            <div class="tab" onclick="switchTab('checkin')">📍 Check-In</div>
        </div>

        <!-- BOOKINGS PANEL -->
        <div class="panel active" id="panel-bookings">
            <div id="bookingList">
                <div class="empty-state"><h3>Loading bookings…</h3></div>
            </div>
        </div>

        <!-- DRIVERS PANEL -->
        <div class="panel" id="panel-drivers">
            <div id="driverList">
                <div class="empty-state"><h3>No active drivers</h3><p>Drivers will appear here when they check in.</p></div>
            </div>
        </div>

        <!-- CHECK-IN PANEL -->
        <div class="panel" id="panel-checkin">
            <div class="form-card">
                <h3>Driver Check-In</h3>
                <div class="input-group">
                    <label>Driver Name</label>
                    <input id="driverName" type="text" placeholder="Your full name" autocomplete="name">
                </div>
                <div class="input-group">
                    <label>Booking ID (optional)</label>
                    <input id="bookingId" type="text" placeholder="e.g. 343747550" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>Delivery Address</label>
                    <input id="deliveryAddress" type="text" placeholder="Customer address">
                </div>
                <div class="input-group">
                    <label>Status</label>
                    <select id="driverStatus">
                        <option value="En Route">En Route</option>
                        <option value="At Customer Location">At Customer Location</option>
                        <option value="Returning to Shop">Returning to Shop</option>
                        <option value="At Shop">At Shop</option>
                    </select>
                </div>
                <div class="tracking-badge" id="trackingBadge">
                    <span class="dot"></span> Tracking active
                </div>
                <div class="btn-row">
                    <button class="btn btn-start" id="startBtn" onclick="startTracking()">▶ Start</button>
                    <button class="btn btn-stop"  id="stopBtn"  onclick="stopTracking()" disabled>■ Stop</button>
                </div>
                <div id="statusBox" class="status-box"></div>
            </div>
        </div>
    </div>

    <div id="map">
        <div class="refresh-indicator" id="refreshIndicator">
            Next update in <span id="countdown">30</span>s
        </div>
    </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHOP = {
    lat:  44.773071217487626,
    lng: -85.73030818718583,
    name: "Aussie Water Sports",
    address: "6214 Traverse Highway, Traverse City, MI 49684"
};

// FareHarbor RSS feed — proxied through allorigins to avoid CORS
const FAREHARBOR_RSS = 'https://api.allorigins.win/get?url=' +
    encodeURIComponent('https://fareharbor.com/aussiewatersports/feed/');

// Google Sheet CSV — your original sheet that Zapier/drivers write GPS to
// Columns: A=BookingId, B=Customer, C=DeliveryLocation, D=DriveTime, E=Distance,
//          F=TotalTime, G=BookingDate, H=PickupDate, I=RentalLength, J=DropoffDate,
//          K=DriverName, L=Latitude, M=Longitude, N=LastUpdated, O=Status, P=DeliveryLat, Q=DeliveryLng
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHKsy7EW-VkVb8Deh-roIx377JryixHBo3i_b5tZQKkjDith2kSCr74nS1lq9vV36SljfSZNmNSOvs/pub?gid=1552296296&single=true&output=csv';

// Zapier webhook — still used to write driver GPS to the sheet
const WEBHOOK_URL = "https://hooks.zapier.com/hooks/catch/25958410/ug08crb/";

const REFRESH_MS   = 30000;
const GPS_INTERVAL = 10000;

// ── STATE ─────────────────────────────────────────────────────────────────────
let map, countdownVal, countdownInterval;
let markers = {}, deliveryMarkers = {}, bookingMarkers = {};
let selectedItem = null;
let trackingInterval = null, isTracking = false, sendCount = 0;
let drivers   = {};   // keyed by driver name — from sheet GPS data
let bookings  = {};   // keyed by booking ID — from FareHarbor RSS
let assignments = {}; // bookingId → driverName

// ── MAP INIT ──────────────────────────────────────────────────────────────────
function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
        center: SHOP, zoom: 11,
        styles: [
            {elementType:'geometry',                   stylers:[{color:'#ebe3cd'}]},
            {elementType:'labels.text.fill',           stylers:[{color:'#523735'}]},
            {elementType:'labels.text.stroke',         stylers:[{color:'#f5f1e6'}]},
            {featureType:'administrative',             elementType:'geometry.stroke',    stylers:[{color:'#c9b2a6'}]},
            {featureType:'administrative.land_parcel', elementType:'geometry.stroke',    stylers:[{color:'#dcd2be'}]},
            {featureType:'administrative.land_parcel', elementType:'labels.text.fill',   stylers:[{color:'#ae9e90'}]},
            {featureType:'poi',                        elementType:'geometry',           stylers:[{color:'#dfd2ae'}]},
            {featureType:'poi',                        elementType:'labels.text.fill',   stylers:[{color:'#93817c'}]},
            {featureType:'road',                       elementType:'geometry',           stylers:[{color:'#f5f1e6'}]},
            {featureType:'road.arterial',              elementType:'geometry',           stylers:[{color:'#fdfcf8'}]},
            {featureType:'road.highway',               elementType:'geometry',           stylers:[{color:'#f8c967'}]},
            {featureType:'road.highway',               elementType:'geometry.stroke',    stylers:[{color:'#e9bc62'}]},
            {featureType:'water',                      elementType:'geometry.fill',      stylers:[{color:'#b9d3c2'}]},
            {featureType:'water',                      elementType:'labels.text.fill',   stylers:[{color:'#92998d'}]}
        ]
    });

    // Shop marker
    new google.maps.Marker({
        position: SHOP, map,
        icon: {
            url: 'https://aussiewatersports.com/wp-content/uploads/2020/05/Aussie-logo-web.png',
            scaledSize: new google.maps.Size(50, 50),
            anchor: new google.maps.Point(25, 25)
        },
        title: SHOP.name, zIndex: 1000
    });

    fetchAll();
    startCountdown();
}

// ── FETCH ALL DATA ────────────────────────────────────────────────────────────
async function fetchAll() {
    await Promise.all([fetchBookings(), fetchDrivers()]);
    renderAll();
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
}

// ── FAREHARBOR RSS ────────────────────────────────────────────────────────────
async function fetchBookings() {
    try {
        const res  = await fetch(FAREHARBOR_RSS);
        const json = await res.json();
        const parser = new DOMParser();
        const xml    = parser.parseFromString(json.contents, 'text/xml');
        const items  = xml.querySelectorAll('item');

        bookings = {};
        items.forEach(item => {
            const title = item.querySelector('title')?.textContent || '';
            const desc  = item.querySelector('description')?.textContent || '';
            const pub   = item.querySelector('pubDate')?.textContent || '';

            // Parse description fields: "Booking ID: #343747550 | Customer: John A Campbell | ..."
            const fields = {};
            desc.split('|').forEach(part => {
                const [k, ...v] = part.split(':');
                if (k && v.length) fields[k.trim()] = v.join(':').trim();
            });

            const bookingId = (fields['Booking ID'] || '').replace('#','').trim();
            if (!bookingId) return;

            bookings[bookingId] = {
                id:           bookingId,
                title:        title,
                customer:     fields['Customer']  || 'Unknown',
                deliveryDate: fields['Delivery']  || '',
                item:         fields['Item']       || title,
                status:       fields['Status']     || 'booked',
                pubDate:      pub,
                // Geocode delivery address later if needed
                // For now we show booking on map at shop location until driver is assigned
                lat: NaN,
                lng: NaN
            };
        });
    } catch (err) {
        console.error('FareHarbor RSS error:', err);
    }
}

// ── SHEET GPS DATA ────────────────────────────────────────────────────────────
async function fetchDrivers() {
    try {
        const res  = await fetch(SHEET_URL + '&t=' + Date.now());
        const text = await res.text();
        const rows = parseCSV(text);

        // Build driver map — keep only the LATEST row per driver (by timestamp)
        const raw = {};
        rows.forEach(row => {
            const name = (row[10] || '').trim(); // K = DriverName
            const lat  = parseFloat(row[11]);    // L = Latitude
            const lng  = parseFloat(row[12]);    // M = Longitude
            if (!name || isNaN(lat) || isNaN(lng)) return;

            const ts = new Date(row[13] || 0);   // N = LastUpdated
            if (!raw[name] || ts > new Date(raw[name].lastUpdated || 0)) {
                raw[name] = {
                    name,
                    lat, lng,
                    bookingId:        row[0]  || '',
                    customer:         row[1]  || '',
                    deliveryLocation: row[2]  || '',
                    status:           row[14] || 'En Route',
                    lastUpdated:      row[13] || new Date().toISOString(),
                    deliveryLat:      parseFloat(row[15]),
                    deliveryLng:      parseFloat(row[16])
                };
            }
        });
        drivers = raw;
    } catch (err) {
        console.error('Sheet fetch error:', err);
    }
}

// ── RENDER EVERYTHING ─────────────────────────────────────────────────────────
function renderAll() {
    renderBookings();
    renderDrivers();
    renderMarkers();
}

// ── BOOKINGS SIDEBAR ──────────────────────────────────────────────────────────
function renderBookings() {
    const list = document.getElementById('bookingList');
    const bArr = Object.values(bookings);

    if (!bArr.length) {
        list.innerHTML = `<div class="empty-state"><h3>No bookings found</h3><p>FareHarbor feed is empty or unavailable.</p></div>`;
        return;
    }

    const driverNames = ['— Unassigned —', ...Object.keys(drivers)];

    list.innerHTML = bArr.map(b => {
        const assigned = assignments[b.id];
        const driver   = assigned ? drivers[assigned] : null;
        const eta      = driver ? calcEtaFromDriver(driver, b) : null;
        const badgeClass = assigned ? 'assigned' : 'unassigned';
        const badgeText  = assigned ? assigned : 'Unassigned';

        return `
        <div class="booking-card ${badgeClass}" data-id="${b.id}" onclick="selectBooking('${b.id}')">
            <div class="booking-title">
                <span>${esc(b.item)}</span>
                <span class="booking-badge ${badgeClass}">${esc(badgeText)}</span>
            </div>
            <div class="booking-detail">
                <div><span class="lbl">Customer:</span> ${esc(b.customer)}</div>
                <div><span class="lbl">Booking:</span> #${esc(b.id)}</div>
                <div><span class="lbl">Date:</span> ${esc(b.deliveryDate || b.pubDate.substring(0,10))}</div>
                <div><span class="lbl">Status:</span> ${esc(b.status)}</div>
            </div>
            <select class="assign-select" onchange="assignDriver('${b.id}', this.value)" onclick="event.stopPropagation()">
                ${driverNames.map(n => `<option value="${esc(n)}" ${n === (assigned || '— Unassigned —') ? 'selected' : ''}>${esc(n)}</option>`).join('')}
            </select>
            ${eta ? `<div class="eta-chip">🚗 ETA: ${esc(eta)}</div>` : ''}
        </div>`;
    }).join('');
}

// ── DRIVERS SIDEBAR ───────────────────────────────────────────────────────────
function renderDrivers() {
    const list = document.getElementById('driverList');
    const dArr = Object.values(drivers);

    if (!dArr.length) {
        list.innerHTML = `<div class="empty-state"><h3>No active drivers</h3><p>Drivers appear here when they check in and send GPS.</p></div>`;
        return;
    }

    list.innerHTML = dArr.map(d => {
        const sc  = statusClass(d.status);
        const eta = etaToShop(d);

        // Find assigned booking
        const assignedBookingId = Object.entries(assignments).find(([bid, dn]) => dn === d.name)?.[0];
        const booking = assignedBookingId ? bookings[assignedBookingId] : null;
        const etaDelivery = booking ? calcEtaFromDriver(d, booking) : null;

        return `
        <div class="driver-card ${sc}" data-driver="${esc(d.name)}" onclick="selectDriver('${jsEsc(d.name)}')">
            <div class="driver-name">
                ${esc(d.name)}
                <span class="status-badge ${sc}">${esc(d.status)}</span>
            </div>
            <div class="driver-detail">
                ${booking ? `<div><span class="lbl">Booking:</span> #${esc(assignedBookingId)}</div>` : ''}
                ${booking ? `<div><span class="lbl">Customer:</span> ${esc(booking.customer)}</div>` : ''}
                <div><span class="lbl">Delivery:</span> ${esc(d.deliveryLocation || 'N/A')}</div>
            </div>
            ${etaDelivery ? `<div class="eta-row">🎯 ETA to delivery: <strong>${esc(etaDelivery)}</strong></div>` : ''}
            <div class="eta-row">🏠 ETA to shop: <strong>${esc(eta)}</strong></div>
            <div class="location-time">Updated: ${esc(timeSince(d.lastUpdated))}</div>
        </div>`;
    }).join('');
}

// ── MAP MARKERS ───────────────────────────────────────────────────────────────
function renderMarkers() {
    // Driver markers
    Object.keys(markers).forEach(n => { if (!drivers[n]) { markers[n].setMap(null); delete markers[n]; } });

    Object.values(drivers).forEach(d => {
        const pos = { lat: d.lat, lng: d.lng };
        if (markers[d.name]) {
            markers[d.name].setPosition(pos);
        } else {
            markers[d.name] = new google.maps.Marker({
                position: pos, map,
                title: d.name,
                icon: {
                    url: 'https://cdn-icons-png.flaticon.com/512/123/123919.png',
                    scaledSize: new google.maps.Size(38, 38),
                    anchor: new google.maps.Point(19, 19)
                },
                zIndex: 500
            });

            const iw = new google.maps.InfoWindow({ content: driverInfoContent(d) });
            markers[d.name]._iw = iw;
            markers[d.name].addListener('click', () => {
                closeAllInfoWindows();
                iw.open(map, markers[d.name]);
                selectDriver(d.name);
            });
        }
        if (markers[d.name]._iw) markers[d.name]._iw.setContent(driverInfoContent(d));
    });

    // Booking markers — show at delivery coords if geocoded, otherwise skip
    Object.keys(bookingMarkers).forEach(id => {
        if (!bookings[id]) { bookingMarkers[id].setMap(null); delete bookingMarkers[id]; }
    });

    Object.values(bookings).forEach(b => {
        if (isNaN(b.lat) || isNaN(b.lng)) return;
        const pos = { lat: b.lat, lng: b.lng };
        if (bookingMarkers[b.id]) {
            bookingMarkers[b.id].setPosition(pos);
        } else {
            bookingMarkers[b.id] = new google.maps.Marker({
                position: pos, map,
                title: `#${b.id} — ${b.customer}`,
                label: { text: '📦', fontSize: '20px' },
                zIndex: 400
            });
            const iw = new google.maps.InfoWindow({ content: bookingInfoContent(b) });
            bookingMarkers[b.id].addListener('click', () => {
                closeAllInfoWindows();
                iw.open(map, bookingMarkers[b.id]);
            });
        }
    });
}

function closeAllInfoWindows() {
    Object.values(markers).forEach(m => m._iw && m._iw.close());
}

function driverInfoContent(d) {
    const assignedBid = Object.entries(assignments).find(([bid, dn]) => dn === d.name)?.[0];
    const b = assignedBid ? bookings[assignedBid] : null;
    const eta = b ? calcEtaFromDriver(d, b) : null;
    return `
        <div style="padding:12px;font-family:'Segoe UI',sans-serif;min-width:220px;color:#333">
            <b style="font-size:16px;color:#2c3e50">${esc(d.name)}</b>
            <p style="margin:6px 0;font-size:13px"><b>Status:</b> ${esc(d.status)}</p>
            ${b ? `<p style="margin:4px 0;font-size:13px"><b>Booking:</b> #${esc(assignedBid)} — ${esc(b.customer)}</p>` : ''}
            ${eta ? `<p style="margin:4px 0;font-size:13px"><b>ETA to delivery:</b> ${esc(eta)}</p>` : ''}
            <p style="margin:4px 0;font-size:13px"><b>ETA to shop:</b> ${esc(etaToShop(d))}</p>
            <p style="margin:6px 0;font-size:12px;color:#999">Updated: ${esc(timeSince(d.lastUpdated))}</p>
        </div>`;
}

function bookingInfoContent(b) {
    const assigned = assignments[b.id];
    return `
        <div style="padding:12px;font-family:'Segoe UI',sans-serif;min-width:200px;color:#333">
            <b style="font-size:15px;color:#2c3e50">${esc(b.item)}</b>
            <p style="margin:6px 0;font-size:13px"><b>Customer:</b> ${esc(b.customer)}</p>
            <p style="margin:4px 0;font-size:13px"><b>Booking:</b> #${esc(b.id)}</p>
            <p style="margin:4px 0;font-size:13px"><b>Driver:</b> ${esc(assigned || 'Unassigned')}</p>
        </div>`;
}

// ── ASSIGN DRIVER TO BOOKING ──────────────────────────────────────────────────
function assignDriver(bookingId, driverName) {
    if (driverName === '— Unassigned —') {
        delete assignments[bookingId];
    } else {
        assignments[bookingId] = driverName;
    }
    renderAll();
}

// ── SELECT BOOKING ────────────────────────────────────────────────────────────
function selectBooking(id) {
    document.querySelectorAll('.booking-card').forEach(c => c.classList.remove('selected'));
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) card.classList.add('selected');

    const b = bookings[id];
    if (b && !isNaN(b.lat) && !isNaN(b.lng)) {
        map.panTo({ lat: b.lat, lng: b.lng });
        map.setZoom(13);
    }

    // Also highlight assigned driver
    const assigned = assignments[id];
    if (assigned && markers[assigned]) {
        map.panTo(markers[assigned].getPosition());
        map.setZoom(13);
        markers[assigned].setAnimation(google.maps.Animation.BOUNCE);
        setTimeout(() => markers[assigned].setAnimation(null), 2100);
    }
}

// ── SELECT DRIVER ─────────────────────────────────────────────────────────────
function selectDriver(name) {
    document.querySelectorAll('.driver-card').forEach(c => c.classList.remove('selected'));
    const card = document.querySelector(`[data-driver="${name.replace(/"/g,'\\"')}"]`);
    if (card) card.classList.add('selected');

    if (markers[name]) {
        map.panTo(markers[name].getPosition());
        map.setZoom(13);
        markers[name].setAnimation(google.maps.Animation.BOUNCE);
        setTimeout(() => markers[name].setAnimation(null), 2100);
    }
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    event.target.classList.add('active');
}

// ── GPS CHECK-IN ──────────────────────────────────────────────────────────────
function showStatus(msg, type) {
    const b = document.getElementById("statusBox");
    b.textContent = msg; b.className = "status-box " + type;
}

function setTrackUI(active) {
    document.getElementById("startBtn").disabled = active;
    document.getElementById("stopBtn").disabled  = !active;
    document.getElementById("trackingBadge").className = "tracking-badge" + (active ? " on" : "");
}

function startTracking() {
    const name = document.getElementById("driverName").value.trim();
    if (!name) { showStatus("⚠️ Enter your name first.", "err"); return; }
    if (!navigator.geolocation) { showStatus("❌ GPS not supported.", "err"); return; }
    isTracking = true; sendCount = 0;
    setTrackUI(true);
    showStatus("🛰 Getting location…", "waiting");
    sendLocation();
    trackingInterval = setInterval(sendLocation, GPS_INTERVAL);
}

function stopTracking() {
    clearInterval(trackingInterval); trackingInterval = null;
    isTracking = false; setTrackUI(false);
    showStatus("⛔ Stopped.", "err");
}

function sendLocation() {
    const driverName = document.getElementById("driverName").value.trim();
    const bookingId  = document.getElementById("bookingId").value.trim();
    const address    = document.getElementById("deliveryAddress").value.trim();
    const status     = document.getElementById("driverStatus").value;

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        sendCount++;

        // Update local driver state immediately so map moves
        drivers[driverName] = Object.assign(drivers[driverName] || {}, {
            name: driverName, lat: latitude, lng: longitude,
            status, deliveryLocation: address,
            bookingId, lastUpdated: new Date().toISOString(),
            deliveryLat: NaN, deliveryLng: NaN,
            customer: '', driveTime: ''
        });
        renderAll();

        try {
            const payload = new URLSearchParams({
                driver_name: driverName, booking_id: bookingId,
                delivery_location: address, status,
                latitude: latitude.toFixed(6), longitude: longitude.toFixed(6),
                timestamp: new Date().toISOString()
            });
            await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
                body: payload.toString()
            });
            showStatus(`✅ Location sent (#${sendCount})`, "ok");
        } catch (e) {
            showStatus("❌ Could not reach Zapier.", "err");
        }
    }, (err) => {
        const msgs = { 1:"❌ Location denied.", 2:"⚠️ GPS unavailable.", 3:"⏱ GPS timeout." };
        showStatus(msgs[err.code] || "GPS error", "err");
    }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

// ── ETA CALCULATIONS ──────────────────────────────────────────────────────────
// Calculate ETA from a driver's current GPS to a FareHarbor booking delivery
function calcEtaFromDriver(driver, booking) {
    const s = (driver.status || '').toLowerCase();
    if (s.includes('return')) return 'Delivery complete';

    // If booking has geocoded coords
    if (!isNaN(booking.lat) && !isNaN(booking.lng)) {
        const dist = miles(driver.lat, driver.lng, booking.lat, booking.lng);
        if (dist < 0.1) return '🎯 Arriving now!';
        const mins = Math.round((dist / 30) * 60);
        const eta  = new Date(); eta.setMinutes(eta.getMinutes() + mins);
        return `~${mins} min (${eta.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})})`;
    }

    // Fall back to delivery coords from sheet
    if (!isNaN(driver.deliveryLat) && !isNaN(driver.deliveryLng)) {
        const dist = miles(driver.lat, driver.lng, driver.deliveryLat, driver.deliveryLng);
        if (dist < 0.1) return '🎯 Arriving now!';
        const mins = Math.round((dist / 30) * 60);
        const eta  = new Date(); eta.setMinutes(eta.getMinutes() + mins);
        return `~${mins} min (${eta.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})})`;
    }

    return 'No delivery coords yet';
}

function etaToShop(d) {
    const s = (d.status || '').toLowerCase();
    if (s.includes('at') && s.includes('shop')) return '✅ At shop';
    const dist = miles(d.lat, d.lng, SHOP.lat, SHOP.lng);
    if (dist < 0.1) return '✅ At shop';
    const mins = Math.round((dist / 30) * 60);
    const eta  = new Date(); eta.setMinutes(eta.getMinutes() + mins);
    return `~${mins} min (${eta.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})})`;
}

function miles(la1,lo1,la2,lo2) {
    const R=3959, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
    const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSV(text) {
    const rows=[]; let row=[],field='',inQ=false;
    for(let i=0;i<text.length;i++){
        const c=text[i],n=text[i+1];
        if(c==='"'){if(inQ&&n==='"'){field+='"';i++;}else inQ=!inQ;}
        else if(c===','&&!inQ){row.push(field.trim());field='';}
        else if((c==='\n'||c==='\r')&&!inQ){
            if(field||row.length){row.push(field.trim());if(row.some(f=>f))rows.push(row);row=[];field='';}
            if(c==='\r'&&n==='\n')i++;
        } else field+=c;
    }
    if(field||row.length){row.push(field.trim());if(row.some(f=>f))rows.push(row);}
    rows.shift();
    return rows;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function statusClass(s) {
    if (!s) return 'offline'; s = s.toLowerCase();
    if (s.includes('route')||s.includes('enroute')) return 'active';
    if (s.includes('return'))                       return 'returning';
    if (s.includes('location')||s.includes('customer')||s.includes('delivery')) return 'at-location';
    return 'offline';
}

function timeSince(ts) {
    if (!ts) return 'Unknown';
    try {
        const m = Math.floor((Date.now()-new Date(ts))/60000);
        if (m<1) return 'Just now';
        if (m<60) return `${m} min ago`;
        return `${Math.floor(m/60)} hr ago`;
    } catch { return ts; }
}

function esc(v) {
    return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function jsEsc(v) { return String(v??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function startCountdown() {
    countdownVal = REFRESH_MS/1000;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        countdownVal--;
        const el = document.getElementById('countdown');
        if (el) el.textContent = countdownVal;
        if (countdownVal <= 0) {
            const ind = document.getElementById('refreshIndicator');
            if (ind) ind.classList.add('active');
            fetchAll().then(() => { if (ind) ind.classList.remove('active'); });
            startCountdown();
        }
    }, 1000);
}
