<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aussie Water Sports — Driver Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 440px; background: #fff; border-right: 3px solid #e0e0e0; overflow-y: auto; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .header { padding-bottom: 16px; margin-bottom: 16px; border-bottom: 3px solid #4CAF50; }
        .header h1 { font-size: 28px; color: #2c3e50; font-weight: 700; margin-bottom: 4px; }
        .last-update { font-size: 13px; color: #888; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; background: #f8f9fa; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; color: #666; transition: all 0.2s; }
        .tab.active { background: #4CAF50; color: white; border-color: #4CAF50; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-card { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #e6e6e6; }
        .form-card h3 { font-size: 16px; color: #2c3e50; margin-bottom: 14px; font-weight: 700; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-weight: 600; color: #555; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }
        .input-group input, .input-group select { width: 100%; padding: 11px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: #fff; color: #333; -webkit-appearance: none; transition: border-color 0.2s; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #4CAF50; }
        .select-wrapper { position: relative; }
        .select-wrapper::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #999; pointer-events: none; }
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-start { background: #4CAF50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .tracking-badge { display: none; align-items: center; gap: 8px; padding: 10px 14px; background: #e8f5e9; border-radius: 8px; font-size: 13px; font-weight: 600; color: #2e7d32; margin-bottom: 10px; }
        .tracking-badge.on { display: flex; }
        .dot { width: 9px; height: 9px; background: #4CAF50; border-radius: 50%; animation: blink 1.3s infinite; }
        @keyframes blink { 0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,0.5); } 50% { box-shadow: 0 0 0 6px rgba(76,175,80,0); } }
        .status-msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; line-height: 1.5; margin-top: 6px; display: none; }
        .status-msg.ok { display: block; background: #d4edda; color: #155724; border: 1px solid #b8dfc4; }
        .status-msg.err { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f1b0b7; }
        .status-msg.waiting { display: block; background: #fff3cd; color: #856404; border: 1px solid #ffe08a; }
        .driver-card { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 14px; border-left: 6px solid; transition: all 0.2s; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
        .driver-card:hover { transform: translateX(6px); }
        .driver-card.selected { background: #e8f5e9; border-left-width: 8px; }
        .driver-card.active { border-color: #4CAF50; }
        .driver-card.returning { border-color: #2196F3; }
        .driver-card.at-location { border-color: #FF9800; }
        .driver-card.offline { border-color: #f44336; opacity: 0.7; }
        .driver-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
        .driver-name-text { font-size: 18px; font-weight: 700; color: #2c3e50; }
        .status-badge { font-size: 12px; padding: 5px 12px; border-radius: 20px; font-weight: 700; color: white; white-space: nowrap; }
        .status-badge.active { background: #4CAF50; }
        .status-badge.returning { background: #2196F3; }
        .status-badge.at-location { background: #FF9800; }
        .status-badge.offline { background: #f44336; }
        .driver-info { font-size: 13px; line-height: 1.9; }
        .driver-info .lbl { color: #888; font-weight: 600; display: inline-block; width: 110px; }
        .driver-info .val { color: #2c3e50; font-weight: 500; }
        .eta-box { background: #fff; padding: 10px 12px; border-radius: 8px; margin-top: 10px; border: 2px solid #e0e0e0; font-size: 13px; }
        .loc-time { font-size: 12px; color: #aaa; margin-top: 8px; font-style: italic; }
        .booking-card { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 14px; border-left: 6px solid #2196F3; box-shadow: 0 2px 6px rgba(0,0,0,0.07); cursor: pointer; transition: all 0.2s; }
        .booking-card:hover { transform: translateX(6px); }
        .booking-title { font-size: 15px; font-weight: 700; color: #2c3e50; margin-bottom: 8px; }
        .booking-info { font-size: 13px; line-height: 1.9; }
        .booking-info .lbl { color: #888; font-weight: 600; display: inline-block; width: 110px; }
        .booking-date { display: inline-block; background: #e3f2fd; color: #1565c0; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; margin-top: 6px; }
        .booking-date.today { background: #e8f5e9; color: #2e7d32; }
        .booking-date.tomorrow { background: #fff3cd; color: #856404; }
        #map { flex: 1; position: relative; }
        .refresh-indicator { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.95); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.15); border: 2px solid #e0e0e0; font-weight: 600; }
        .refresh-indicator.active { background: rgba(76,175,80,0.95); color: white; border-color: #4CAF50; }
        .loading { text-align: center; padding: 40px 16px; color: #888; }
        .spinner { border: 4px solid #e0e0e0; border-top: 4px solid #4CAF50; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 40px 16px; color: #aaa; }
        .empty-state h3 { font-size: 17px; color: #888; margin-bottom: 8px; }
        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-track { background: #f1f1f1; }
        .sidebar::-webkit-scrollbar-thumb { background: #4CAF50; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="header">
            <h1>🚤 Driver Tracker</h1>
            <div class="last-update">Last updated: <span id="lastUpdate">--</span></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('drivers')">📍 Drivers</div>
            <div class="tab" onclick="switchTab('checkin')">✏️ Check-In</div>
            <div class="tab" onclick="switchTab('bookings')">📋 Bookings</div>
        </div>
        <div class="tab-content active" id="tab-drivers">
            <div id="driverList"><div class="loading"><div class="spinner"></div><div>Loading…</div></div></div>
        </div>
        <div class="tab-content" id="tab-checkin">
            <div class="form-card">
                <h3>📋 Your Details</h3>
                <div class="input-group"><label>Driver Name</label><input id="driverName" type="text" placeholder="Your full name"></div>
                <div class="input-group"><label>Booking ID</label><input id="bookingId" type="text" placeholder="FareHarbor booking ID"></div>
                <div class="input-group"><label>Delivery Address</label><input id="deliveryAddress" type="text" placeholder="Customer delivery address"></div>
                <div class="input-group"><label>Status</label><div class="select-wrapper"><select id="driverStatus"><option value="En Route">En Route</option><option value="At Customer Location">At Customer Location</option><option value="Returning to Shop">Returning to Shop</option><option value="At Shop">At Shop</option></select></div></div>
            </div>
            <div class="form-card">
                <h3>📍 Live Tracking</h3>
                <div class="tracking-badge" id="trackingBadge"><span class="dot"></span> Tracking active — updating every 10 sec</div>
                <div class="btn-row">
                    <button class="btn btn-start" id="startBtn" onclick="startTracking()">▶ Start Tracking</button>
                    <button class="btn btn-stop" id="stopBtn" onclick="stopTracking()" disabled>■ Stop</button>
                </div>
                <div id="statusMsg" class="status-msg"></div>
            </div>
        </div>
        <div class="tab-content" id="tab-bookings">
            <div id="bookingList"><div class="loading"><div class="spinner"></div><div>Loading bookings…</div></div></div>
        </div>
    </div>
    <div id="map">
        <div class="refresh-indicator" id="refreshIndicator">Next update in <span id="countdown">10</span>s</div>
    </div>
</div>
<script>
const SHOP = { lat: 44.773071217487626, lng: -85.73030818718583, name: "Aussie Water Sports" };

// ✅ Your API Test Ap sheet — Zapier writes driver GPS here
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ1VPNYB4UJSOZTdZFTX9sfUbP5Qeo-c43aMFHwFveQ698_Tkf8DRxtQiEZnOB6dIpc4w9BN0Pobfv/pub?gid=0&single=true&output=csv';

// ✅ Google Apps Script — drivers send GPS directly to Google Sheet
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwPi7E1UDKjEztraNafAEsyMis8dUOgXSvBL7nMloiQMUGecVdO4qoA9sFwshjSrRw/exec";

// ✅ FareHarbor RSS feed — FIXED URL matching your boss's feed
const FAREHARBOR_RSS_PROXY = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://fareharbor.com/aussiewatersports/feed/');

// Sheet column indexes: A=Timestamp, B=DriverName, C=Latitude, D=Longitude, E=Address, F=Status, G=BookingId
const COL = { timestamp:0, driverName:1, latitude:2, longitude:3, address:4, status:5, bookingId:6 };
const REFRESH_MS = 10000;

let map, cdVal, cdInt, selectedDriver=null, markers={}, deliveryMarkers={};
let trackingInterval=null, isTracking=false, sendCount=0;
let bookings=[];

function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
        center: SHOP, zoom: 12,
        styles: [
            {elementType:'geometry',stylers:[{color:'#ebe3cd'}]},
            {elementType:'labels.text.fill',stylers:[{color:'#523735'}]},
            {elementType:'labels.text.stroke',stylers:[{color:'#f5f1e6'}]},
            {featureType:'administrative',elementType:'geometry.stroke',stylers:[{color:'#c9b2a6'}]},
            {featureType:'poi',elementType:'geometry',stylers:[{color:'#dfd2ae'}]},
            {featureType:'road',elementType:'geometry',stylers:[{color:'#f5f1e6'}]},
            {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#f8c967'}]},
            {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#e9bc62'}]},
            {featureType:'water',elementType:'geometry.fill',stylers:[{color:'#b9d3c2'}]}
        ]
    });
    new google.maps.Marker({
        position: SHOP, map,
        icon: { url:'https://aussiewatersports.com/wp-content/uploads/2020/05/Aussie-logo-web.png', scaledSize:new google.maps.Size(50,50), anchor:new google.maps.Point(25,25) },
        title: SHOP.name, zIndex: 1000
    });
    fetchSheet();
    fetchFareHarbor();
    startCD();
}

async function fetchSheet() {
    try {
        const r = await fetch(SHEET_URL + '&t=' + Date.now());
        const t = await r.text();
        const drivers = getLatest(parseCSV(t));
        renderDrivers(drivers);
        renderMarkers(drivers);
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    } catch(e) { console.error(e); }
}

async function fetchFareHarbor() {
    try {
        const r = await fetch(FAREHARBOR_RSS_PROXY);
        const d = await r.json();
        const parser = new DOMParser();
        const xml = parser.parseFromString(d.contents, 'text/xml');
        const items = xml.querySelectorAll('item');
        bookings = Array.from(items).map(item => {
            const title = item.querySelector('title')?.textContent || '';
            const desc  = item.querySelector('description')?.textContent || '';
            const pub   = item.querySelector('pubDate')?.textContent || '';
            const idMatch       = desc.match(/Booking ID: #(\d+)/);
            const custMatch     = desc.match(/Customer: ([^|]+)/);
            const deliveryMatch = desc.match(/Delivery: ([^|]+)/);
            const itemMatch     = desc.match(/Item: ([^|]+)/);
            const statusMatch   = desc.match(/Status: ([^|]+)/);
            return {
                id:       idMatch       ? idMatch[1].trim()       : '',
                customer: custMatch     ? custMatch[1].trim()     : '',
                delivery: deliveryMatch ? deliveryMatch[1].trim() : '',
                item:     itemMatch     ? itemMatch[1].trim()     : title,
                status:   statusMatch   ? statusMatch[1].trim()   : '',
                pubDate:  pub
            };
        }).filter(b => b.id); // only keep bookings with a valid ID
        renderBookings();
    } catch(e) {
        console.error('FareHarbor fetch failed:', e);
        document.getElementById('bookingList').innerHTML = '<div class="empty-state"><h3>Could not load bookings</h3><p>Check FareHarbor feed URL.</p></div>';
    }
}

function parseCSV(text) {
    const rows=[]; let row=[],field='',inQ=false;
    for(let i=0;i<text.length;i++){
        const c=text[i],n=text[i+1];
        if(c==='"'){if(inQ&&n==='"'){field+='"';i++;}else inQ=!inQ;}
        else if(c===','&&!inQ){row.push(field.trim());field='';}
        else if((c==='\n'||c==='\r')&&!inQ){if(field||row.length){row.push(field.trim());if(row.some(f=>f))rows.push(row);row=[];field='';}if(c==='\r'&&n==='\n')i++;}
        else field+=c;
    }
    if(field||row.length){row.push(field.trim());if(row.some(f=>f))rows.push(row);}
    rows.shift(); return rows;
}

function getLatest(rows) {
    const d={};
    rows.forEach(r=>{
        const name=(r[COL.driverName]||'').trim();
        const lat=parseFloat(r[COL.latitude]),lng=parseFloat(r[COL.longitude]);
        if(!name||isNaN(lat)||isNaN(lng))return;
        const ts=r[COL.timestamp]||'';
        if(d[name]&&new Date(ts)<=new Date(d[name].timestamp))return;
        d[name]={name,lat,lng,address:r[COL.address]||'',timestamp:ts,status:r[COL.status]||'En Route',bookingId:r[COL.bookingId]||''};
    });
    return d;
}

function renderDrivers(drivers) {
    const list=document.getElementById('driverList');
    if(!Object.keys(drivers).length){
        list.innerHTML='<div class="empty-state"><h3>No Active Drivers</h3><p>Drivers check in using the Check-In tab.</p></div>';return;
    }
    list.innerHTML=Object.values(drivers).map(d=>{
        const sc=statusCls(d.status);
        const eta=etaShop(d);
        const bk=bookings.find(b=>b.id===d.bookingId);
        return `<div class="driver-card ${sc}" data-driver="${esc(d.name)}" onclick="selectDriver('${jsEsc(d.name)}')">
            <div class="driver-header"><div class="driver-name-text">${esc(d.name)}</div><span class="status-badge ${sc}">${esc(d.status)}</span></div>
            <div class="driver-info">
                ${bk?`<div><span class="lbl">Customer:</span><span class="val"> ${esc(bk.customer)}</span></div>`:''}
                ${bk?`<div><span class="lbl">Boat:</span><span class="val"> ${esc(bk.item)}</span></div>`:''}
                <div><span class="lbl">Delivery:</span><span class="val"> ${esc(d.address||'N/A')}</span></div>
                <div><span class="lbl">Booking ID:</span><span class="val"> ${esc(d.bookingId||'N/A')}</span></div>
            </div>
            <div class="eta-box"><span style="color:#888;font-weight:600;">🏠 ETA to Shop:</span> <strong>${esc(eta)}</strong></div>
            <div class="loc-time">Updated: ${esc(timeSince(d.timestamp))}</div>
        </div>`;
    }).join('');
}

function renderBookings() {
    const list=document.getElementById('bookingList');
    if(!bookings.length){
        list.innerHTML='<div class="empty-state"><h3>No Bookings Found</h3><p>FareHarbor bookings will appear here automatically.</p></div>';return;
    }
    list.innerHTML=bookings.map(b=>{
        const dt=new Date(b.delivery);
        const isToday=dt.toDateString()===new Date().toDateString();
        const isTmrw=dt.toDateString()===new Date(Date.now()+86400000).toDateString();
        const lbl=isToday?'🟢 TODAY':isTmrw?'🟡 TOMORROW':dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const cls=isToday?'booking-date today':isTmrw?'booking-date tomorrow':'booking-date';
        return `<div class="booking-card" onclick="useBooking('${jsEsc(b.id)}')">
            <div class="booking-title">${esc(b.item)}</div>
            <div class="booking-info">
                <div><span class="lbl">Booking ID:</span> <strong>#${esc(b.id)}</strong></div>
                <div><span class="lbl">Customer:</span> ${esc(b.customer)}</div>
                <div><span class="lbl">Delivery:</span> ${esc(b.delivery)}</div>
                <div><span class="lbl">Status:</span> ${esc(b.status)}</div>
            </div>
            <span class="${cls}">${lbl}</span>
            <div style="font-size:12px;color:#4CAF50;margin-top:8px;font-weight:600;">Tap to assign to a driver →</div>
        </div>`;
    }).join('');
}

function useBooking(id) {
    const b=bookings.find(x=>x.id===id);
    if(b){
        document.getElementById('bookingId').value=b.id;
        if(b.delivery) document.getElementById('deliveryAddress').value=b.delivery;
    }
    switchTab('checkin');
    document.getElementById('driverName').focus();
}

function renderMarkers(drivers) {
    Object.keys(markers).forEach(n=>{if(!drivers[n]){markers[n].setMap(null);delete markers[n];}});
    Object.values(drivers).forEach(d=>{
        const pos={lat:d.lat,lng:d.lng};
        if(markers[d.name]){markers[d.name].setPosition(pos);}
        else {
            markers[d.name]=new google.maps.Marker({
                position:pos,map,title:d.name,
                icon:{url:'https://cdn-icons-png.flaticon.com/512/123/123919.png',scaledSize:new google.maps.Size(40,40),anchor:new google.maps.Point(20,20)}
            });
            const iw=new google.maps.InfoWindow({content:buildInfoContent(d)});
            markers[d.name]._iw=iw;
            markers[d.name].addListener('click',()=>{
                Object.values(markers).forEach(m=>m._iw&&m._iw.close());
                iw.open(map,markers[d.name]);
                selectDriver(d.name);
            });
        }
        if(markers[d.name]._iw) markers[d.name]._iw.setContent(buildInfoContent(d));
    });
}

function buildInfoContent(d) {
    const bk=bookings.find(b=>b.id===d.bookingId);
    return `<div style="padding:12px;font-family:'Segoe UI',sans-serif;color:#333;min-width:220px;">
        <h3 style="margin:0 0 8px;color:#2c3e50;font-size:16px;">${esc(d.name)}</h3>
        <p style="margin:4px 0;font-size:13px;"><b>Status:</b> ${esc(d.status)}</p>
        ${bk?`<p style="margin:4px 0;font-size:13px;"><b>Customer:</b> ${esc(bk.customer)}</p>`:''}
        ${bk?`<p style="margin:4px 0;font-size:13px;"><b>Boat:</b> ${esc(bk.item)}</p>`:''}
        <p style="margin:4px 0;font-size:13px;"><b>Delivery:</b> ${esc(d.address||'N/A')}</p>
        <hr style="margin:8px 0;border:none;border-top:1px solid #eee;">
        <p style="margin:4px 0;font-size:13px;"><b>🏠 ETA to Shop:</b> ${esc(etaShop(d))}</p>
        <p style="margin:4px 0;font-size:12px;color:#999;">Updated: ${esc(timeSince(d.timestamp))}</p>
    </div>`;
}

function selectDriver(name) {
    selectedDriver=name;
    document.querySelectorAll('.driver-card').forEach(c=>c.classList.remove('selected'));
    const card=document.querySelector(`[data-driver="${name.replace(/"/g,'\\"')}"]`);
    if(card)card.classList.add('selected');
    if(markers[name]){map.panTo(markers[name].getPosition());map.setZoom(14);markers[name].setAnimation(google.maps.Animation.BOUNCE);setTimeout(()=>markers[name].setAnimation(null),2100);}
    switchTab('drivers');
}

function showMsg(msg,type){const b=document.getElementById("statusMsg");b.textContent=msg;b.className="status-msg "+type;}
function setUI(active){document.getElementById("startBtn").disabled=active;document.getElementById("stopBtn").disabled=!active;document.getElementById("trackingBadge").className="tracking-badge"+(active?" on":"");}

function startTracking(){
    const name=document.getElementById("driverName").value.trim();
    if(!name){showMsg("⚠️ Enter your name first.","err");return;}
    if(!navigator.geolocation){showMsg("❌ GPS not supported.","err");return;}
    isTracking=true;sendCount=0;setUI(true);showMsg("🛰 Getting location…","waiting");
    sendLoc();trackingInterval=setInterval(sendLoc,10000);
}

function stopTracking(){
    clearInterval(trackingInterval);trackingInterval=null;
    isTracking=false;setUI(false);showMsg("⛔ Tracking stopped.","err");
}

function sendLoc(){
    const driverName=document.getElementById("driverName").value.trim();
    const bookingId=document.getElementById("bookingId").value.trim();
    const address=document.getElementById("deliveryAddress").value.trim();
    const status=document.getElementById("driverStatus").value;
    navigator.geolocation.getCurrentPosition(async(pos)=>{
        const{latitude,longitude}=pos.coords;sendCount++;
        const payload=new URLSearchParams({
            "Driver Name":driverName,
            "Latitude":latitude.toFixed(6),
            "Longitude":longitude.toFixed(6),
            "Address":address,
            "Timestamp":new Date().toISOString(),
            "booking_id":bookingId,
            "status":status
        });
        try{
            await fetch(WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded;charset=UTF-8"},body:payload.toString()});
            showMsg(`✅ Location sent (#${sendCount})`,"ok");
        }catch(e){showMsg("❌ Could not send location.","err");}
    },(err)=>{
        const msgs={1:"❌ Location denied. Settings → Safari → Location → Allow.",2:"⚠️ GPS unavailable.",3:"⏱ GPS timed out…"};
        showMsg(msgs[err.code]||"GPS error: "+err.message,"err");
    },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}

function switchTab(name){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
    const idx={'drivers':0,'checkin':1,'bookings':2}[name];
    document.querySelectorAll('.tab')[idx].classList.add('active');
}

function etaShop(d){
    const s=(d.status||'').toLowerCase();
    if(s.includes('at')&&s.includes('shop'))return'✅ At Shop';
    const dist=miles(d.lat,d.lng,SHOP.lat,SHOP.lng);
    if(dist<0.1)return'✅ At Shop';
    const mins=Math.round((dist/30)*60);
    const eta=new Date();eta.setMinutes(eta.getMinutes()+mins);
    return`~${mins} min (${eta.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})})`;
}

function miles(la1,lo1,la2,lo2){
    const R=3959,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180,
    a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function statusCls(s){
    if(!s)return'offline';s=s.toLowerCase();
    if(s.includes('route')||s.includes('enroute'))return'active';
    if(s.includes('return'))return'returning';
    if(s.includes('location')||s.includes('customer')||s.includes('delivery'))return'at-location';
    return'offline';
}

function timeSince(ts){
    if(!ts)return'Unknown';
    try{const m=Math.floor((Date.now()-new Date(ts))/60000);if(m<1)return'Just now';if(m<60)return`${m} min ago`;return`${Math.floor(m/60)} hr ago`;}
    catch{return ts;}
}

function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function jsEsc(v){return String(v??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function startCD(){
    cdVal=REFRESH_MS/1000;clearInterval(cdInt);
    cdInt=setInterval(()=>{
        cdVal--;
        const el=document.getElementById('countdown');if(el)el.textContent=cdVal;
        if(cdVal<=0){
            const ind=document.getElementById('refreshIndicator');
            if(ind)ind.classList.add('active');
            fetchSheet();
            fetchFareHarbor();
            setTimeout(()=>{if(ind)ind.classList.remove('active');},1000);
            startCD();
        }
    },1000);
}
