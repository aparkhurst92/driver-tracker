<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Tracker</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f4f4;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:420px;
background:white;
overflow-y:auto;
padding:20px;
border-right:3px solid #ddd;
}

.header h1{
margin:0;
}

#map{
flex:1;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.start{
background:#4CAF50;
color:white;
}

.stop{
background:#f44336;
color:white;
margin-top:8px;
}

.driver-card{
background:#f9f9f9;
padding:12px;
border-radius:8px;
margin-top:12px;
border-left:5px solid #4CAF50;
}

.status{
font-size:13px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="header">
<h1>🚤 Driver Tracker</h1>
<div>Last update: <span id="lastUpdate">--</span></div>
</div>

<hr>

<h3>Driver Check-In</h3>

<label>Driver Name</label>
<input id="driverName">

<label>Booking ID</label>
<input id="bookingId">

<label>Delivery Address</label>
<input id="deliveryAddress">

<label>Status</label>
<select id="driverStatus">
<option>En Route</option>
<option>At Customer Location</option>
<option>Returning to Shop</option>
<option>At Shop</option>
</select>

<button class="start" onclick="startTracking()">Start Tracking</button>
<button class="stop" onclick="stopTracking()">Stop Tracking</button>

<div class="status" id="trackingStatus"></div>

<hr>

<div id="driverList"></div>

</div>

<div id="map"></div>

</div>

<script>

const CONFIG={

sheetUrl:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHKsy7EW-VkVb8Deh-roIx377JryixHBo3i_b5tZQKkjDith2kSCr74nS1lq9vV36SljfSZNmNSOvs/pub?gid=1552296296&single=true&output=csv',

refreshInterval:5000,

shopLocation:{
lat:44.773071217487626,
lng:-85.73030818718583
}

};

const WEBHOOK_URL="https://hooks.zapier.com/hooks/catch/25958410/ug08crb/";

let map;
let markers={};
let trackingInterval=null;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
zoom:12,
center:CONFIG.shopLocation
});

new google.maps.Marker({
position:CONFIG.shopLocation,
map:map,
title:"Boat Shop"
});

fetchSheet();
setInterval(fetchSheet,CONFIG.refreshInterval);

}

async function fetchSheet(){

const response=await fetch(CONFIG.sheetUrl,{cache:"no-store"});
const text=await response.text();

const rows=text.split("\n").map(r=>r.split(","));

rows.shift();

let drivers={};

rows.forEach(row=>{

let driver=row[10];
let lat=parseFloat(row[11]);
let lng=parseFloat(row[12]);

if(driver && !isNaN(lat) && !isNaN(lng)){

drivers[driver]={
name:driver,
lat:lat,
lng:lng,
booking:row[0],
customer:row[1],
delivery:row[2],
status:row[14],
updated:row[13]
};

}

});

renderDrivers(drivers);
updateMarkers(drivers);

document.getElementById("lastUpdate").innerText=new Date().toLocaleTimeString();

}

function renderDrivers(drivers){

let html="";

Object.values(drivers).forEach(d=>{

html+=`
<div class="driver-card">
<b>${d.name}</b><br>
Booking: ${d.booking}<br>
Customer: ${d.customer}<br>
Delivery: ${d.delivery}<br>
Status: ${d.status}<br>
Updated: ${timeSince(d.updated)}
</div>
`;

});

document.getElementById("driverList").innerHTML=html;

}

function updateMarkers(drivers){

Object.keys(markers).forEach(name=>{
if(!drivers[name]){
markers[name].setMap(null);
delete markers[name];
}
});

Object.values(drivers).forEach(d=>{

let pos={lat:d.lat,lng:d.lng};

if(markers[d.name]){
markers[d.name].setPosition(pos);
}else{

markers[d.name]=new google.maps.Marker({
position:pos,
map:map,
title:d.name,
icon:{
url:"https://cdn-icons-png.flaticon.com/512/149/149059.png",
scaledSize:new google.maps.Size(40,40)
}
});

}

});

}

function timeSince(t){

if(!t)return "";

let diff=(Date.now()-new Date(t))/60000;

if(diff<1)return"just now";
if(diff<60)return Math.floor(diff)+" min ago";

return Math.floor(diff/60)+" hr ago";

}

function startTracking(){

let name=document.getElementById("driverName").value;

if(!name){
alert("Enter driver name");
return;
}

sendLocation();

trackingInterval=setInterval(sendLocation,30000);

document.getElementById("trackingStatus").innerText="Tracking started";

}

function stopTracking(){

clearInterval(trackingInterval);

document.getElementById("trackingStatus").innerText="Tracking stopped";

}

function sendLocation(){

navigator.geolocation.getCurrentPosition(async pos=>{

let payload=new URLSearchParams({

driver_name:document.getElementById("driverName").value,
booking_id:document.getElementById("bookingId").value,
delivery_location:document.getElementById("deliveryAddress").value,
status:document.getElementById("driverStatus").value,

latitude:pos.coords.latitude,
longitude:pos.coords.longitude,
timestamp:new Date().toISOString()

});

await fetch(WEBHOOK_URL,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:payload
});

document.getElementById("trackingStatus").innerText="Location sent "+new Date().toLocaleTimeString();

});

}

</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAeWt2vpIcYZ-6_bsH9cxdeLWEDYCiuAXs&callback=initMap"></script>

</body>
</html>
