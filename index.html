<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Tracker</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
display:flex;
height:100vh;
}

.sidebar{
width:400px;
background:white;
border-right:2px solid #eee;
padding:20px;
overflow:auto;
}

h1{
margin-top:0;
}

#map{
flex:1;
height:100vh;
}

.driver-card{
background:#f5f5f5;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.label{
font-weight:bold;
}

</style>
</head>

<body>

<div class="sidebar">

<h1>🚗 Driver Tracker</h1>

<div id="lastUpdate">Last updated: --</div>

<hr>

<div id="driverList">
Loading drivers...
</div>

</div>

<div id="map"></div>


<script>

const CONFIG = {

sheetUrl:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHKsy7EW-VkVb8Deh-roIx377JryixHBo3i_b5tZQKkjDith2kSCr74nS1lq9vV36SljfSZNmNSOvs/pub?gid=1552296296&single=true&output=csv',

columns:{
bookingId:0,
customerName:1,
deliveryLocation:2,
driveTime:3,
distance:4,
totalTime:5,
bookingDate:6,
pickupDate:7,
rentalLength:8,
dropoffDate:9,
driverName:10,
latitude:11,
longitude:12,
lastUpdated:13,
status:14,
deliveryLatitude:15,
deliveryLongitude:16
},

shopLocation:{
lat:44.773071217487626,
lng:-85.73030818718583,
name:"Boat Shop"
}

};

let map;
let markers={};

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:CONFIG.shopLocation,
zoom:12
});

new google.maps.Marker({
position:CONFIG.shopLocation,
map:map,
title:"Boat Shop"
});

fetchData();

setInterval(fetchData,60000);

}

async function fetchData(){

try{

const response=await fetch(CONFIG.sheetUrl);
const text=await response.text();

const rows=parseCSV(text);

updateDashboard(rows);

document.getElementById("lastUpdate").innerText="Last updated: "+new Date().toLocaleTimeString();

}catch(error){

console.error(error);

document.getElementById("driverList").innerHTML="⚠️ Could not load Google Sheet";

}

}

function parseCSV(text){

const rows=text.split("\n").map(r=>r.split(","));

rows.shift();

return rows;

}

function updateDashboard(rows){

const drivers={};

rows.forEach(row=>{

const name=row[CONFIG.columns.driverName];
const lat=parseFloat(row[CONFIG.columns.latitude]);
const lng=parseFloat(row[CONFIG.columns.longitude]);

if(name && !isNaN(lat) && !isNaN(lng)){

drivers[name]={

name:name,
lat:lat,
lng:lng,
customer:row[CONFIG.columns.customerName],
deliveryLocation:row[CONFIG.columns.deliveryLocation],
status:row[CONFIG.columns.status]||"En Route"

};

}

});

updateDriverList(drivers);

updateMarkers(drivers);

}

function updateDriverList(drivers){

let html="";

Object.values(drivers).forEach(driver=>{

html+=`

<div class="driver-card">

<div><span class="label">Driver:</span> ${driver.name}</div>
<div><span class="label">Customer:</span> ${driver.customer}</div>
<div><span class="label">Delivery:</span> ${driver.deliveryLocation}</div>
<div><span class="label">Status:</span> ${driver.status}</div>

</div>

`;

});

document.getElementById("driverList").innerHTML=html;

}

function updateMarkers(drivers){

Object.keys(markers).forEach(name=>{

if(!drivers[name]){

markers[name].setMap(null);
delete markers[name];

}

});

Object.values(drivers).forEach(driver=>{

const pos={lat:driver.lat,lng:driver.lng};

if(markers[driver.name]){

markers[driver.name].setPosition(pos);

}else{

markers[driver.name]=new google.maps.Marker({
position:pos,
map:map,
title:driver.name
});

}

});

}

window.initMap=initMap;

</script>


<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAeWt2vpIcYZ-6_bsH9cxdeLWEDYCiuAXs&callback=initMap">
</script>

</body>
</html>
